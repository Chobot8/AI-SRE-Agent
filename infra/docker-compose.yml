# Local demo stack for the AI SRE Agent (KAN-10).
#
# Usage (from the repo root):
#   docker compose -f infra/docker-compose.yml up --build
#
# Services:
#   db      - PostgreSQL persistence for incident investigations (KAN-15)
#   migrate - one-shot: runs `alembic upgrade head`, then exits (KAN-16)
#   api     - FastAPI backend (health + incident diagnosis endpoints)
#   ui      - Streamlit incident-triage demo that calls the api over HTTP
#
# Notes on scope:
#   * Persistence (KAN-15/16) - Alembic is the single schema-creation path. The
#     `migrate` service applies the migrations (which reuse infra/db/schema.sql)
#     against the `db` service before the api starts; data persists in the named
#     volume `pgdata`. See docs/data-model.md.
#   * Vector database  - the RAG store is an in-process, JSON-backed index built
#     from knowledge/runbooks at runtime; embeddings are referenced, not stored
#     in Postgres yet (pgvector is a later step).
#   * Mock observability data - the bundled sample-data/incidents/*.json files
#     are baked into the api image and replayed via the /scenarios API.
#
# Configuration is externalized through environment variables. Real secrets are
# never committed: copy .env.example to .env (gitignored) to supply local values.

name: ai-sre-agent

services:
  db:
    image: postgres:16-alpine
    container_name: ai-sre-agent-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sre_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ai_sre}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sre} -d ${POSTGRES_DB:-ai_sre}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # One-shot: create/upgrade the schema via Alembic, then exit. Alembic is the
  # single schema-creation path (KAN-16); the api waits for this to succeed.
  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    image: ai-sre-agent-api:local
    container_name: ai-sre-agent-migrate
    command: ["alembic", "upgrade", "head"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://sre:sre_local_dev@db:5432/ai_sre}"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    image: ai-sre-agent-api:local
    container_name: ai-sre-agent-api
    # Optional local overrides / secrets. Missing .env is fine (sane defaults).
    env_file:
      - path: ../.env
        required: false
    environment:
      APP_NAME: ${APP_NAME:-AI SRE Agent}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      HOST: 0.0.0.0
      PORT: 8000
      # Connection string for the persistence layer (KAN-15). Quoted because the
      # value contains ':' and '/'. If you override POSTGRES_* below, set a
      # matching DATABASE_URL in .env (compose does not nest ${...} expansions).
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://sre:sre_local_dev@db:5432/ai_sre}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else sys.exit(1)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    image: ai-sre-agent-ui:local
    container_name: ai-sre-agent-ui
    environment:
      # The UI talks to the api service over the compose network.
      BACKEND_API_URL: http://api:8000
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).status==200 else sys.exit(1)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  pgdata:
