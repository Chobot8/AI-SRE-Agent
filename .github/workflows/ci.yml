name: CI

# Runs on every pull request and on pushes to main (acceptance criteria KAN-11).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Format, lint, tests & schema checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Formatting check (ruff format)
        run: ruff format --check --diff .

      - name: Lint (ruff check)
        run: ruff check --output-format=github .

      - name: Unit tests + schema checks (pytest)
        run: pytest -q

  docker-build:
    name: Build container images
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.backend
          push: false
          load: true
          tags: ai-sre-agent-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.ui
          push: false
          load: true
          tags: ai-sre-agent-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test backend container health
        run: |
          docker run -d --name api -p 8000:8000 ai-sre-agent-api:ci
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then
              echo "" && echo "backend is healthy"
              ok=1
              break
            fi
            sleep 2
          done
          echo "--- container logs ---"
          docker logs api || true
          docker rm -f api >/dev/null 2>&1 || true
          test "$ok" = "1"
