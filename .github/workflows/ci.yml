name: CI

# Runs on every pull request and on pushes to main (acceptance criteria KAN-11).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Format, lint, tests & schema checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sre
          POSTGRES_PASSWORD: sre_local_dev
          POSTGRES_DB: ai_sre
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sre -d ai_sre"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Persistence tests (KAN-16) run against the postgres service above.
      DATABASE_URL: postgresql+psycopg://sre:sre_local_dev@localhost:5432/ai_sre
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Advisory: reports formatting drift without blocking the pipeline.
      - name: Formatting check (ruff format, advisory)
        run: ruff format --check --diff .
        continue-on-error: true

      - name: Lint (ruff check)
        run: ruff check --output-format=github .

      # Create the schema from an empty DB via Alembic (single schema path).
      - name: Apply database migrations
        run: alembic upgrade head

      - name: Unit tests + schema checks (pytest)
        run: pytest -q

  docker-build:
    name: Build container images
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.backend
          push: false
          load: true
          tags: ai-sre-agent-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.ui
          push: false
          load: true
          tags: ai-sre-agent-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test backend container health
        run: |
          docker run -d --name api -p 8000:8000 ai-sre-agent-api:ci
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then
              echo "" && echo "backend is healthy"
              ok=1
              break
            fi
            sleep 2
          done
          echo "--- container logs ---"
          docker logs api || true
          docker rm -f api >/dev/null 2>&1 || true
          test "$ok" = "1"
